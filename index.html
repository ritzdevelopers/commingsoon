<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background (cursor parallax via JS) -->
    <div class="bg"></div>

    <!-- ══ MAIN CONTENT ══════════════════════════════ -->
    <div class="content">

        <!-- Logo + tagline -->
        <div class="logo-row">
            <svg class="logo-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                <path d="M10,55 Q20,20 50,15 Q40,30 35,45 Q50,25 70,20 Q55,38 45,50 Q38,58 25,62 Z"
                    fill="rgba(255,255,255,0.9)" />
                <path d="M45,50 Q55,52 65,48 Q58,56 48,56 Z" fill="rgba(255,255,255,0.85)" />
                <path d="M25,62 Q15,70 5,68 Q12,60 22,58" fill="rgba(255,255,255,0.75)" />
            </svg>
            <div class="tagline">Unlock the Future with AI!</div>
        </div>

        <!-- Headings -->
        <h1 class="coming">COMING</h1>
        <h1 class="soon">SOON</h1>

        <!-- CTA Button -->
        <button class="send-btn" id="getInTouchBtn">GET IN TOUCH</button>
        <p class="form-message" id="formMessage"></p>

    </div>

    <!-- ══ SOCIAL ICONS ══════════════════════════════ -->
    <div class="social-icons">

        <!-- Contact -->
        <a href="tel:+919220516777" aria-label="Call">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" />
            </svg>
        </a>

        <!-- LinkedIn -->
        <a href="https://www.linkedin.com/company/ritzmediaworld/" target="_blank" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452z" />
            </svg>
        </a>

        <!-- Facebook -->
        <a href="https://www.facebook.com/ritzmediaworld" target="_blank" aria-label="Facebook">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
            </svg>
        </a>

        <!-- YouTube -->
        <a href="https://www.youtube.com/c/RitzMediaWorldCreativeThinksMedia" target="_blank" aria-label="YouTube">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z" />
            </svg>
        </a>

    </div>

    <!-- ══ GLASS MODAL OVERLAY ════════════════════════ -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="glass-form" id="glassForm">

            <!-- Close button -->
            <button class="modal-close" id="modalClose" aria-label="Close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
            </button>

            <!-- Gradient top bar -->
            <div class="glass-form__bar"></div>

            <!-- Header -->
            <div class="glass-form__header">
                <h2 class="glass-form__title">Get In Touch</h2>
                <p class="glass-form__subtitle">We'd love to hear from you</p>
            </div>

            <!-- Body / Form -->
            <div class="glass-form__body">

                <!-- Name -->
                <div class="glass-input-group">
                    <label class="glass-label" for="inputName">Name</label>
                    <div class="glass-input-wrap">
                        <!-- <svg class="glass-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/>
                        </svg> -->
                        <input class="glass-input" id="inputName" type="text" placeholder="Your full name"
                            autocomplete="name" />
                    </div>
                </div>

                <!-- Email -->
                <div class="glass-input-group">
                    <label class="glass-label" for="inputEmail">Email</label>
                    <div class="glass-input-wrap">
                        <!-- <svg class="glass-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg> -->
                        <input class="glass-input" id="inputEmail" type="email" placeholder="you@example.com"
                            autocomplete="email" />
                    </div>
                </div>

                <!-- Phone -->
                <div class="glass-input-group">
                    <label class="glass-label" for="inputPhone">Phone</label>
                    <div class="glass-input-wrap">
                        <!-- <svg class="glass-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                        </svg> -->
                        <input class="glass-input" id="inputPhone" type="tel" placeholder="Your phone number"
                            autocomplete="tel" />
                    </div>
                </div>

                <!-- Message -->
                <div class="glass-input-group">
                    <label class="glass-label" for="inputMsg">Message</label>
                    <div class="glass-input-wrap">
                        <!-- <svg class="glass-icon glass-icon--top" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-4 4v-4z"/>
                        </svg> -->
                        <textarea class="glass-input glass-textarea" id="inputMsg" placeholder="Your message"
                            rows="4"></textarea>
                    </div>
                </div>

                <!-- Submit -->
                <button class="glass-btn" id="submitBtn">
                    <span>Send Message</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                    </svg>
                </button>

                <!-- Success message inside modal -->
                <p class="glass-success-msg" id="glassSuccessMsg"></p>

            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
